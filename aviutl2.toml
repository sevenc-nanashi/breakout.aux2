#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。
[project]
id = "sevenc-nanashi.breakout-aux2"
name = "breakout.aux2"
version = "0.1.0"

[development]
aviutl2_version = "latest"

[artifacts.breakout_aux2-aux2]
destination = "Plugin/breakout_aux2.aux2"

[artifacts.breakout_aux2-aux2.profiles.debug]
build = "cargo build"
source = "target/debug/breakout_aux2.dll"

[artifacts.breakout_aux2-aux2.profiles.release]
build = "cargo build --release"
source = "target/release/breakout_aux2.dll"

[release]
prebuild = ["cargo about generate ./about.hbs -o ./release/package.txt"]
package_template = "./release/package.txt"
package_information = "{name} v{version} / ブロック崩し"
